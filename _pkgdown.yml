url: https://charlescoverdale.github.io/inflateR/

template:
  bootstrap: 5

navbar:
  structure:
    left:  [intro, reference, articles, tutorials, news]
    right: [search, github]
  components:
    github:
      icon: fa-github
      href: https://github.com/charlescoverdale/inflateR

reference:
  - title: "CPI adjustment"
    desc: "Adjust monetary values using Consumer Price Index data"
    contents:
      - adjust_inflation
      - historical_value

  - title: "GDP deflator adjustment"
    desc: "Adjust monetary values using GDP deflator data"
    contents:
      - adjust_real
      - historical_real

  - title: "CPI datasets"
    desc: "Consumer Price Index series by currency (2020 = 100)"
    contents:
      - uk_cpi
      - aud_cpi
      - usd_cpi
      - eur_cpi
      - cad_cpi
      - jpy_cpi
      - cny_cpi
      - chf_cpi
      - nzd_cpi
      - inr_cpi
      - krw_cpi
      - brl_cpi
      - nok_cpi

  - title: "GDP deflator datasets"
    desc: "GDP deflator series by currency (2020 = 100)"
    contents:
      - uk_gdp_def
      - aud_gdp_def
      - usd_gdp_def
      - eur_gdp_def
      - cad_gdp_def
      - jpy_gdp_def
      - cny_gdp_def
      - chf_gdp_def
      - nzd_gdp_def
      - inr_gdp_def
      - krw_gdp_def
      - brl_gdp_def
      - nok_gdp_def
